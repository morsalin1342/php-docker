name: Docker Publish

on:
  # Run on pushes to the master branch, but only if relevant files have changed.
  push:
    branches: [ "master" ]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'data/**'
  # Allow the workflow to be triggered manually from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Use a matrix strategy to build for multiple PHP versions and image variants in parallel.
    strategy:
      fail-fast: false
      matrix:
        php_version: [ '8.2', '8.3', '8.4', '8.5' ]
        image_type: [ 'fpm', 'cli' ]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/php
            ${{ secrets.DOCKER_HUB_ORG }}/php
          # Generate tags based on the PHP version and image type.
          # Example for php_version=8.4, image_type=fpm: 8.4-fpm, 8.4-fpm-bookworm
          # Example for php_version=8.4, image_type=cli: 8.4-cli, 8.4-cli-bookworm
          tags: |
            type=raw,value=${{ matrix.php_version }}-${{ matrix.image_type }}
            type=raw,value=${{ matrix.php_version }}-${{ matrix.image_type }}-bookworm
            type=raw,value=latest-${{ matrix.image_type }},enable=${{ matrix.php_version == '8.5' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Pass the PHP version and image type as build arguments.
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            IMAGE_TYPE=${{ matrix.image_type }}
          # Use the tags generated by the metadata-action step.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GHA caching for faster builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_readme:
    # This job runs only after all matrix jobs in 'build_and_publish' have succeeded.
    needs: build_and_publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Update Docker Hub description (personal repo)
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: ${{ secrets.DOCKER_HUB_USERNAME }}/php
          readme-filepath: ./README.md

      - name: Update Docker Hub description (org repo)
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: ${{ secrets.DOCKER_HUB_ORG }}/php
          readme-filepath: ./README.md
